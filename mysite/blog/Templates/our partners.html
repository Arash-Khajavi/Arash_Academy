.ticker {
  position: fixed;
  bottom: 100;
  width: 100%;
  background: blue;
  color: white;
  overflow: hidden;
  white-space: nowrap;
  margin-top:500px;
}

.ticker-content {
  display: inline-block;
  padding-left: 100%;
  animation: scroll 15s linear infinite;
}

@keyframes scroll {
  0% {
    transform: translateX(0);
  }
  100% {
    transform: translateX(-100%);
  }
}
</style>
